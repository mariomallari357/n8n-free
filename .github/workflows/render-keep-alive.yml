name: Render Keep-Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: render-keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check n8n readiness
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "::error::RENDER_URL is not set"
            exit 1
          fi

          base_url="${RENDER_URL%/}"
          curl --fail --show-error --silent \
            --retry 5 \
            --retry-delay 15 \
            --max-time 120 \
            "${base_url}/healthz/readiness"
